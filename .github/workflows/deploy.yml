name: Build & Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /opt/opscommand

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            echo ">>> Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            echo ">>> Pulling latest image..."
            docker pull "$IMAGE"

            echo ">>> Pulling latest code..."
            cd ${{ env.DEPLOY_PATH }}
            git pull origin master

            echo ">>> Updating docker-compose to use ghcr image..."
            sed -i "s|build:.*|image: $IMAGE|g" docker-compose.prod.yml
            sed -i '/dockerfile:/d' docker-compose.prod.yml
            sed -i '/target:/d' docker-compose.prod.yml
            sed -i '/context:/d' docker-compose.prod.yml

            echo ">>> Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm app php artisan migrate --force

            echo ">>> Caching config..."
            docker compose -f docker-compose.prod.yml run --rm app php artisan config:cache
            docker compose -f docker-compose.prod.yml run --rm app php artisan route:cache
            docker compose -f docker-compose.prod.yml run --rm app php artisan view:cache

            echo ">>> Restarting services..."
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo ">>> Cleaning up..."
            docker system prune -f

            echo ">>> Deploy complete!"
            echo ">>> Image: $IMAGE"
